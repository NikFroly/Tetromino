<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="rhombus" width="25%" height="25%" fill="orange">
      <polygon points="20,0 40,20 60,0"/>
      <polygon points="80,20 60,40 80,60"/>
      <polygon points="60,80 40,60 20,80"/>
      <polygon points="0,60 20,40 0,20"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#rhombus)"/>
</svg>