<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="rhombus" width="12.5%" height="12.5%" stroke="black" stroke-dasharray="2,4">
      <line x1="10" y1="0" x2="20" y2="10"/>
      <line x1="20" y1="10" x2="30" y2="0"/>
      <line x1="40" y1="10" x2="30" y2="20"/>
      <line x1="30" y1="20" x2="40" y2="30"/>
      <line x1="30" y1="40" x2="20" y2="30"/>
      <line x1="20" y1="30" x2="10" y2="40"/>
      <line x1="0" y1="30" x2="10" y2="20"/>
      <line x1="10" y1="20" x2="0" y2="10"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#rhombus)"/>
</svg>